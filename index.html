<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Local Test</title>
    <!-- Notice we aren't loading Tailwind here; your editor.js handles that! -->
</head>
<body class="p-10 bg-gray-50 min-h-screen font-sans">

    <h1 class="text-4xl font-black text-gray-900 mb-4">Local Testing Environment</h1>
    
    <p class="text-lg text-gray-600 mb-8 max-w-2xl">
        This is a sandbox to test the <strong>editor.js</strong>. Try right-clicking on these elements, using the keyboard arrows to navigate, and pressing <kbd class="bg-gray-200 px-1 rounded font-mono text-sm border border-gray-300">Shift + A</kbd> to add new ones.
    </p>

    <!-- A flex container to test flexbox controls and nesting -->
    <div class="flex flex-row gap-6 p-6 bg-white border border-gray-200 rounded-xl shadow-sm mb-8">
        
        <div class="w-1/3 bg-blue-100 p-6 rounded-lg text-blue-800 text-center font-bold">
            Box 1 (Try moving me)
        </div>
        
        <div class="w-1/3 bg-green-100 p-6 rounded-lg text-green-800 text-center font-bold shadow-inner">
            Box 2 (Check my Extras)
        </div>
        
        <div class="w-1/3 flex flex-col gap-4">
            <button class="bg-indigo-600 text-white font-semibold px-4 py-3 rounded-md hover:bg-indigo-700 transition-colors">
                Click Me
            </button>
            <img src="https://avatars.githubusercontent.com/u/140980143" alt="Placeholder" class="w-[150px] rounded-md h-auto border-2 border-dashed border-gray-300">
        </div>

    </div>

    <!-- Make sure editor.js is in the exact same folder as this HTML file -->
    <script src="./editor.js"></script>
</body>
</html>
